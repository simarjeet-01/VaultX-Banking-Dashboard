<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals — VaultX Banking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/analytics.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">V</div><span class="logo-text">VaultX</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="accounts.html" class="nav-item"><span class="nav-icon">🏦</span> Accounts</a>
      <a href="transactions.html" class="nav-item"><span class="nav-icon">📋</span> Transactions</a>
      <a href="cards.html" class="nav-item"><span class="nav-icon">💳</span> Cards</a>
      <a href="transfer.html" class="nav-item"><span class="nav-icon">↗️</span> Transfer</a>
      <div class="nav-section-label">Insights</div>
      <a href="analytics.html" class="nav-item"><span class="nav-icon">📊</span> Analytics</a>
      <a href="goals.html" class="nav-item active"><span class="nav-icon">🎯</span> Goals</a>
      <div class="nav-section-label">Account</div>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="#" class="nav-item" onclick="handleLogout()"><span class="nav-icon">🚪</span> Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="window.location.href='settings.html'">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Simarjeet&backgroundColor=b6e3f4" alt="User" />
        <div class="user-info"><div class="user-name" id="sidebarUserName">Simarjeet</div><div class="user-role">Premium Member</div></div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-search"><span class="search-icon">🔍</span><input type="text" placeholder="Search..." /></div>
    <div class="topbar-right">
      <button class="topbar-btn" id="themeToggle" onclick="Theme.toggle()">🌙</button>
      <button class="topbar-btn" onclick="window.location.href='index.html'">🔔<span class="notif-count" id="notifCount">2</span></button>
      <div class="topbar-user" onclick="window.location.href='settings.html'">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Simarjeet&backgroundColor=b6e3f4" alt="User" />
        <span id="topbarUserName">Simarjeet</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-container">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1>Savings Goals</h1>
          <p>Track and achieve your financial milestones</p>
        </div>
        <button class="btn btn-primary" onclick="openAddGoalModal()">
          + New Goal
        </button>
      </div>

      <!-- Goals Stats -->
      <div class="goals-stats-row" id="goalsStats"></div>

      <!-- Goals Grid -->
      <div class="goals-grid" id="goalsGrid"></div>
    </div>
  </main>
</div>

<!-- Add Goal Modal -->
<div class="modal-overlay" id="addGoalModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Goal</h3>
      <button class="modal-close" onclick="closeModal('addGoalModal')">✕</button>
    </div>
    <form id="addGoalForm" style="display:flex;flex-direction:column;gap:1.25rem;">
      <div class="form-group"><label>Goal Name</label><input type="text" class="form-control" id="goalName" placeholder="e.g. Emergency Fund" /></div>
      <div class="form-group">
        <label>Choose Icon</label>
        <div id="iconPicker" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <span style="font-size:0;"><input type="hidden" id="selectedIcon" value="🎯" /></span>
        </div>
      </div>
      <div class="form-group"><label>Target Amount (₹)</label><input type="number" class="form-control" id="goalTarget" placeholder="e.g. 100000" /></div>
      <div class="form-group"><label>Initial Savings (₹)</label><input type="number" class="form-control" id="goalSaved" placeholder="0" /></div>
      <div class="form-group"><label>Target Date</label><input type="date" class="form-control" id="goalDeadline" /></div>
      <div class="form-group"><label>Description</label><input type="text" class="form-control" id="goalDesc" placeholder="What is this goal for?" /></div>
      <button type="submit" class="btn btn-primary btn-block">Create Goal 🎯</button>
    </form>
  </div>
</div>

<!-- Add Funds Modal -->
<div class="modal-overlay" id="addFundsModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3 id="addFundsTitle">Add Funds</h3>
      <button class="modal-close" onclick="closeModal('addFundsModal')">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <input type="hidden" id="addFundsGoalId" />
      <div class="form-group">
        <label>Amount to Add (₹)</label>
        <input type="number" class="form-control" id="addFundsAmount" placeholder="e.g. 5000" />
      </div>
      <button class="btn btn-primary btn-block" onclick="submitAddFunds()">Add to Goal 💰</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/goals.js"></script>
</body>
</html>
