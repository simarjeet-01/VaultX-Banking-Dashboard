<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts — VaultX Banking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="app-layout">

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">V</div>
      <span class="logo-text">VaultX</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
      <a href="accounts.html" class="nav-item active"><span class="nav-icon">🏦</span> Accounts</a>
      <a href="transactions.html" class="nav-item"><span class="nav-icon">📋</span> Transactions</a>
      <a href="cards.html" class="nav-item"><span class="nav-icon">💳</span> Cards</a>
      <a href="transfer.html" class="nav-item"><span class="nav-icon">↗️</span> Transfer</a>
      <div class="nav-section-label">Insights</div>
      <a href="analytics.html" class="nav-item"><span class="nav-icon">📊</span> Analytics</a>
      <a href="goals.html" class="nav-item"><span class="nav-icon">🎯</span> Goals</a>
      <div class="nav-section-label">Account</div>
      <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="#" class="nav-item" onclick="handleLogout()"><span class="nav-icon">🚪</span> Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="window.location.href='settings.html'">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Simarjeet&backgroundColor=b6e3f4" alt="User" />
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">Simarjeet</div>
          <div class="user-role">Premium Member</div>
        </div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="topbar-search">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search..." />
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" id="themeToggle" onclick="Theme.toggle()">🌙</button>
      <button class="topbar-btn" onclick="window.location.href='index.html?notif=1'">🔔<span class="notif-count" id="notifCount">2</span></button>
      <div class="topbar-user" onclick="window.location.href='settings.html'">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Simarjeet&backgroundColor=b6e3f4" alt="User" />
        <span id="topbarUserName">Simarjeet</span>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-container">
      <div class="page-header">
        <h1>Accounts</h1>
        <p>Manage your savings and current accounts</p>
      </div>

      <!-- Account Cards -->
      <div class="grid-2" style="margin-bottom:2rem;" id="accountCards"></div>

      <!-- Account Details Tabs -->
      <div class="card" style="margin-bottom:1.5rem;">
        <div class="section-header" style="margin-bottom:1.5rem;">
          <h3>Account Details</h3>
          <div style="display:flex; gap:0.5rem;" id="accDetailTabs"></div>
        </div>
        <div id="accDetailContent"></div>
      </div>

      <!-- Mini Statement -->
      <div class="card">
        <div class="section-header">
          <h3>Recent Transactions</h3>
          <a href="transactions.html">View All</a>
        </div>
        <div class="txn-list" id="accTxnList"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script>
requireAuth();
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  const user = Storage.getUser();
  document.getElementById('sidebarUserName').textContent = user.name.split(' ')[0];
  document.getElementById('topbarUserName').textContent = user.name.split(' ')[0];
  document.getElementById('notifCount').textContent = Storage.getUnreadCount();

  const accounts = Storage.getAccounts();
  let activeAccId = accounts[0].id;

  // Render account cards
  const cardsContainer = document.getElementById('accountCards');
  cardsContainer.innerHTML = accounts.map(acc => `
    <div class="account-card" style="background:${acc.color};" onclick="selectAccount('${acc.id}')">
      <div>
        <div class="acc-type">${acc.type} Account</div>
        <div class="acc-balance" id="bal_${acc.id}">₹${formatNumber(acc.balance)}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;">
        <div class="acc-number">•••• •••• ${acc.shortNumber}</div>
        <div class="acc-bank-logo">V</div>
      </div>
    </div>
  `).join('');

  // Tabs
  const tabsContainer = document.getElementById('accDetailTabs');
  tabsContainer.innerHTML = accounts.map((acc, i) => `
    <button class="card-tab ${i===0?'active':''}" onclick="selectAccount('${acc.id}', this)">${acc.type}</button>
  `).join('');

  function selectAccount(id, tabEl) {
    activeAccId = id;
    document.querySelectorAll('#accDetailTabs .card-tab').forEach(t => t.classList.remove('active'));
    if (tabEl) tabEl.classList.add('active');
    renderDetail(id);
    renderTxns(id);
  }

  function renderDetail(id) {
    const acc = accounts.find(a => a.id === id);
    document.getElementById('accDetailContent').innerHTML = `
      <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:1rem;">
        ${[
          ['Account Number', acc.number],
          ['Account Type', acc.type],
          ['IFSC Code', acc.ifsc],
          ['Branch', acc.branch],
          ['Interest Rate', acc.interestRate + '% p.a.'],
          ['Available Balance', '₹' + formatNumber(acc.balance)],
          ['Currency', acc.currency],
          ['Status', '<span class="badge badge-success">Active</span>'],
        ].map(([k,v]) => `
          <div class="card card-sm" style="gap:0.25rem;">
            <div class="text-muted fs-sm">${k}</div>
            <div class="fw-600" style="font-size:0.9rem;">${v}</div>
          </div>
        `).join('')}
      </div>
      <div style="display:flex; gap:0.75rem; margin-top:1.25rem; flex-wrap:wrap;">
        <a href="transfer.html" class="btn btn-primary btn-sm">↗ Transfer Money</a>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Statement downloaded!','success')">📄 Download Statement</button>
        <button class="btn btn-secondary btn-sm" onclick="showToast('IFSC copied!','info')">📋 Copy IFSC</button>
      </div>
    `;
  }

  function renderTxns(id) {
    const txns = Storage.getTransactions().filter(t => t.account === id).slice(0, 8);
    document.getElementById('accTxnList').innerHTML = txns.map(txn => `
      <div class="txn-item">
        <div class="txn-icon"><img src="${txn.icon}" alt="" onerror="this.src='https://img.icons8.com/color/48/money.png'" /></div>
        <div class="txn-info">
          <div class="txn-merchant">${txn.merchant}</div>
          <div class="txn-category">${txn.category} • ${formatDate(txn.date)}</div>
        </div>
        <div>
          <div class="txn-amount ${txn.amount > 0 ? 'amount-credit' : 'amount-debit'}">
            ${txn.amount > 0 ? '+' : ''}₹${formatNumber(Math.abs(txn.amount))}
          </div>
          <div class="txn-date"><span class="badge badge-success">Completed</span></div>
        </div>
      </div>
    `).join('') || '<p class="text-muted" style="padding:1rem;text-align:center;">No transactions found</p>';
  }

  renderDetail(activeAccId);
  renderTxns(activeAccId);
  window.selectAccount = selectAccount;
});

function formatNumber(n) { return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatDate(d) { return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
function handleLogout() {
  Storage.clearSession(); window.location.href = 'login.html';
}
function showToast(message, type = 'info') {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span><span>${message}</span>`;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
}
</script>
</body>
</html>
